<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена — MADAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #241821;   /* тёмный баклажан */
      --bg-2:    #2e1f2a;
      --text:    #ece0dc;   /* мягкий блаш */
      --muted:   #b59a9a;
      --gold:    #c9a876;   /* шампань-золото */
      --gold-dim:#9c7f57;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(120% 120% at 50% 0%, var(--bg-2) 0%, var(--bg) 60%);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 520px;
      animation: rise 1s ease both;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 40px;
      padding-left: 0.5em; /* компенсация трекинга */
    }

    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(110px, 30vw, 200px);
      font-weight: 500;
      line-height: 0.9;
      color: var(--text);
      position: relative;
      display: inline-block;
    }

    /* золотая черта-флёр под числом — signature-элемент */
    .code::after {
      content: "";
      display: block;
      width: 64px;
      height: 1px;
      margin: 24px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 400;
      margin-top: 32px;
      color: var(--text);
    }

    .text {
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      margin-top: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 44px;
      padding: 15px 42px;
      border: 1px solid var(--gold-dim);
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--gold);
      color: var(--bg);
      outline: none;
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(201, 168, 118, 0.35);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">MADAM</p>
    <div class="code">404</div>
    <h1 class="title">Этой страницы у нас нет в записи</h1>
    <p class="text">
      Похоже, страница, которую вы искали, переехала или никогда не существовала.
      Но мы всегда рады видеть вас на главной.
    </p>
    <!-- Ведёт на корень сайта. Адрес проекта на GitHub Pages — /MADAM-/ -->
    <a class="btn" href="/MADAM-/">На главную</a>
  </main>
</body>
</html>
